name: Build and Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Bump patch version in TradeBot.cs
        id: version
        shell: pwsh
        run: |
          $file = "SysBot.Pokemon/Helpers/TradeBot.cs"
          $content = Get-Content $file -Raw
          $match = [regex]::Match($content, 'Version\s*=\s*"v?([0-9]+)\.([0-9]+)\.([0-9]+)"')
          $major = $match.Groups[1].Value
          $minor = $match.Groups[2].Value
          $patch = [int]$match.Groups[3].Value + 1
          $newVer = "$major.$minor.$patch"
          $tag = "v$newVer"
          $newContent = $content -replace 'Version\s*=\s*"v?[0-9]+\.[0-9]+\.[0-9]+"', "Version = `"$tag`""
          [System.IO.File]::WriteAllText($file, $newContent)
          "VERSION=$newVer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "New version: $tag"

      - name: Commit and tag version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SysBot.Pokemon/Helpers/TradeBot.cs
          git commit -m "Bump version to ${{ steps.version.outputs.TAG }} [skip ci]"
          git tag ${{ steps.version.outputs.TAG }}
          git push origin main
          git push origin ${{ steps.version.outputs.TAG }}

      - name: Publish
        run: dotnet publish SysBot.Pokemon.WinForms/SysBot.Pokemon.WinForms.csproj -c Release

      - name: Find published exe
        id: exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem "SysBot.Pokemon.WinForms/bin/Release/net10.0-windows/win-x64/publish/" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No exe found in publish folder!"; exit 1 }
          "EXE_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Exe: $($exe.FullName)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: PokedexMasterBot ${{ steps.version.outputs.TAG }}
          body: "Automated release - built from latest push to main."
          files: ${{ steps.exe.outputs.EXE_PATH }}
