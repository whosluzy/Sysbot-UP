name: Build and Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from TradeBot.cs
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "SysBot.Pokemon/Helpers/TradeBot.cs" -Raw
          $match = [regex]::Match($content, 'Version\s*=\s*"v?([0-9.]+)"')
          $ver = $match.Groups[1].Value
          $build = "${{ github.run_number }}"
          $tag = "v$ver-build.$build"
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "TITLE=PokedexMasterBot v$ver (Build $build)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $ver | Tag: $tag"

      - name: Publish
        run: dotnet publish SysBot.Pokemon.WinForms/SysBot.Pokemon.WinForms.csproj -c Release

      - name: Find published exe
        id: exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem "SysBot.Pokemon.WinForms/bin/Release/net10.0-windows/win-x64/publish/" -Filter "*.exe" | Select-Object -First 1
          "EXE_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Exe: $($exe.Name)"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $title = "${{ steps.version.outputs.TITLE }}"
          $exe = "${{ steps.exe.outputs.EXE_PATH }}"
          gh release create $tag "$exe" `
            --title "$title" `
            --notes "Automated release — built from latest push to main."
